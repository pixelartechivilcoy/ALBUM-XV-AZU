<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis XV Azu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="estilos.css">
</head>
<body>
    
  <main class="album-wrapper">

    <img src="Slytherin.png" class="slytherin-badge">

    <h1 class="album-title">Los XV de Azu</h1>

<p class="album-text">
Escaneaste el QR correcto 📸<br>
Subí tus fotos y videos para crear juntos el álbum de esta noche.
</p>

<div class="slider-fade">
  <img src="1.jpg" class="active">
  <img src="2 (2).jpg">
  <img src="3.jpg">
  <img src="4 (2).jpg">
  <img src="5 (2).jpg">
  <img src="6.jpg">
  <img src="7.jpg">
  <img src="8.jpg">
  <img src="9.jpg">
</div>

<div class="magic-divider">✦ 🐍 ✦</div>

    <div class="album-photos">
  <iframe
src="https://drive.google.com/embeddedfolderview?id=1XLTi9uaVlR4IOykgOKWJ7B05DKTmFj64#grid"
style="width:100%; height:600px; border:0;">
</iframe>
</div>


    <a      href="https://drive.google.com/drive/folders/1XLTi9uaVlR4IOykgOKWJ7B05DKTmFj64?usp=sharing"

      target="_blank"
      class="album-btn"
    >
      Subir fotos
    </a>

    <p class="album-footer-note">
    ✨ Gracias por compartir tus recuerdos de esta noche.
</div>

<div class="pixelarte-footer">
  <p>✨ Hecho con magia por Pixelarte</p>

  <a
    href="https://www.instagram.com/pixelartechivilcoy"
    target="_blank"
  >
    @pixelartechivilcoy
  </a>
</div>

  </main>

  <script>
const slides = document.querySelectorAll('.slider-fade img');

let current = 0;

slides[current].classList.add('active');

setInterval(() => {

  slides[current].classList.remove('active');

  current++;

  if(current >= slides.length){
    current = 0;
  }

  slides[current].classList.add('active');

}, 4000);
</script>

</body>
</html>
